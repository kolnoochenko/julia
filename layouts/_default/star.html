<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моєї Юлі</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Чорний фон для максимального контрасту з червоним та золотим */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000000; 
        }
        canvas { display: block; touch-action: none; position: fixed; top: 0; left: 0; z-index: 1; }
        
        #msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600;
            font-size: 26px; text-align: center; opacity: 0;
            transition: opacity 2.5s ease-in-out; pointer-events: none; width: 220px; 
            letter-spacing: 1px;
            /* Сяйво тексту: біле ядро з червоно-золотим ореолом */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.4);
            z-index: 10; line-height: 1.3;
        }

        /* Стиль для підпису під головною фразою */
        .sub-msg { 
            font-size: 18px; 
            opacity: 0.8; 
            margin-top: 10px; 
            font-weight: 400; 
            letter-spacing: 2px; 
        }

        @media (min-width: 600px) { 
            #msg { font-size: 32px; width: 350px; } 
            .sub-msg { font-size: 22px; } 
        }

        #hint {
            position: fixed; bottom: 60px; width: 100%; text-align: center;
            color: rgba(255,215,0,0.4); font-family: sans-serif; font-size: 16px; z-index: 10;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div id="msg">
        Я тебе люблю ❤️
        <div class="sub-msg">Ти мій всесвіт</div>
    </div>
    
    <div id="hint">З'єднай золоті зірочки...</div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let w, h, stars = [], heartPoints = [], isFinished = false, flashAlpha = 0;

        // --- УЛЮБЛЕНА ПАЛІТРА ---
        const colorGold = '#FFD700';       // Золото для зірок-підказок
        const colorHeart = '#FF0000';      // Червоний для контуру
        const colorGlow = '#FF4500';       // Оранжево-червоне гаряче світіння
        const colorActive = '#FFFFFF';     // Біле ядро при дотику

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;

            // Створення вираженого зоряного фону (250 зірок)
            stars = [];
            for (let i = 0; i < 250; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * Math.random() * 1.6, 
                    o: 0.3 + Math.random() * 0.6, // Вираженіша прозорість
                    s: 0.005 + Math.random() * 0.02
                });
            }

            // Розрахунок точок серця
            heartPoints = [];
