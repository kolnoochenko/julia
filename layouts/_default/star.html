<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моєї Юлі</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Глибокий темно-синій фон для виразності */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000015; }
        canvas { display: block; touch-action: none; position: fixed; top: 0; left: 0; z-index: 1; }
        
        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Playfair Display', serif; 
            font-style: italic;
            font-weight: 600;
            font-size: 26px; 
            text-align: center;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            pointer-events: none;
            
            /* Фіксуємо ширину для центрування всередині серця */
            width: 220px; 
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 215, 0, 0.3);
            z-index: 10;
            line-height: 1.3;
        }

        @media (min-width: 600px) {
            #msg {
                font-size: 32px;
                width: 350px;
            }
        }
/* Стиль для підпису */
.sub-msg {
    font-size: 18px; /* Менший розмір */
    opacity: 0.8;    /* Ледь прозорий для витонченості */
    margin-top: 10px; /* Відступ від основного тексту */
    font-weight: 400; /* Трохи тонший за основний */
    letter-spacing: 2px;
}

/* Адаптація для великих екранів */
@media (min-width: 600px) {
    .sub-msg {
        font-size: 22px;
    }
}
        #hint {
            position: fixed; bottom: 50px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 16px; z-index: 10;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="msg">
    Я тебе люблю ❤️
    <div class="sub-msg">Ти мій всесвіт</div>
    </div>
    <div id="hint">З'єднай жовті цяточки...</div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        let w, h, stars = [], heartPoints = [], isFinished = false, flashAlpha = 0;

        const colorGold = '#FFD700';       
        const colorActive = '#FFFFFF';     
        const colorPink = '#FF69B4';       
        const colorPinkGlow = '#FF1493';   

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            
            // --- ПОСИЛЕНИЙ ЗОРЯНИЙ ФОН ---
            stars = [];
            // Збільшили кількість зірок до 250
            for (let i = 0; i < 250; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    // Різноманітність розмірів: деякі зірки більші
                    r: Math.random() * Math.random() * 1.5, 
                    // Посилена прозорість: небо виглядає вираженішим
                    o: 0.2 + Math.random() * 0.7,
                    s: 0.005 + Math.random() * 0.02
                });
            }

            heartPoints = [];
            const centerX = w / 2;
            const centerY = h / 2 - 20;
            const scale = Math.min(w, h) / 40; 

            const totalPoints = 22; 
            for (let i = 0; i < totalPoints; i++) {
                const t = (i / totalPoints) * Math.PI * 2;
                const x = centerX + 16 * Math.pow(Math.sin(t), 3) * scale;
                const y = centerY - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
                heartPoints.push({
                    x, y, active: false, 
                    phase: Math.random() * Math.PI * 2,
                    blinkSpeed: 0.03 + Math.random() * 0.05
                });
            }
        }

        function draw() {
            // Глибокий темно-синій для виразності фону
            ctx.fillStyle = '#000015';
            ctx.fillRect(0, 0, w, h);

            // 1. Фонові зірки (тепер густіші)
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.o += (Math.random() - 0.5) * 0.03;
                // Посилений діапазон мерехтіння
                if(s.o < 0.3) s.o = 0.3; if(s.o > 0.9) s.o = 0.9;
            });

            // 2. Підказка (пунктир)
            if (!isFinished && flashAlpha <= 0) {
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
                ctx.lineWidth = 0.5; ctx.setLineDash([3, 6]); ctx.beginPath();
                ctx.moveTo(heartPoints[0].x, heartPoints[0].y);
                heartPoints.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.closePath(); ctx.stroke(); ctx.setLineDash([]);
            }

            if (flashAlpha > 0) {
                flashAlpha -= 0.012;
            }

            if (hasActivePoints() && isFinished) {
                ctx.shadowBlur = 0; ctx.setLineDash([]); 

                // Ефектний рожевий спалах
                ctx.strokeStyle = `rgba(255, 105, 180, ${0.2 + flashAlpha * 0.3})`;
                ctx.lineWidth = 12 + flashAlpha * 10;
                ctx.shadowBlur = 40 + flashAlpha * 40; 
                ctx.shadowColor = `rgba(255, 20, 147, ${0.4 + flashAlpha * 0.6})`;
                drawHeartLine();

                ctx.strokeStyle = `rgba(255, 20, 147, ${0.5 + flashAlpha * 0.5})`;
                ctx.lineWidth = 6 + flashAlpha * 6;
                ctx.shadowBlur = 15 + flashAlpha * 25; 
                ctx.shadowColor = `rgba(255, 255, 255, ${0.3 + flashAlpha * 0.7})`;
                drawHeartLine();

                ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 + flashAlpha * 0.2})`;
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 2; 
                ctx.shadowColor = 'white';
                drawHeartLine();

                ctx.shadowBlur = 0; 
            } else if (hasActivePoints()) {
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.lineWidth = 1.5;
                drawHeartLine();
            }

            heartPoints.forEach(p => {
                p.phase += p.blinkSpeed;
                const currentOpacity = 0.3 + (Math.sin(p.phase) + 1) * 0.35;

                if (p.active) {
                    if (isFinished) {
                        ctx.shadowBlur = 15; ctx.shadowColor = colorPinkGlow;
                        ctx.fillStyle = colorPink;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
                    } else {
                        ctx.shadowBlur = 10; ctx.shadowColor = 'white';
                        ctx.fillStyle = colorActive;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, Math.PI*2); ctx.fill();
                    }
                } else {
                    ctx.shadowBlur = 5; ctx.shadowColor = colorGold;
                    ctx.fillStyle = `rgba(255, 215, 0, ${currentOpacity})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        function drawHeartLine() {
            ctx.beginPath();
            let hasMoved = false;
            heartPoints.forEach((p) => {
                if(p.active) {
                    if(!hasMoved) { ctx.moveTo(p.x, p.y); hasMoved = true; }
                    else { ctx.lineTo(p.x, p.y); }
                }
            });
            ctx.stroke();
        }

        function hasActivePoints() {
            return heartPoints.some(p => p.active);
        }

        function handleTouch(ex, ey) {
            if (isFinished) return;
            heartPoints.forEach(p => {
                const d = Math.hypot(ex - p.x, ey - p.y);
                if (d < 35) p.active = true;
            });

            if (heartPoints.every(p => p.active)) {
                flashAlpha = 1.0; 
                isFinished = true;
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                setTimeout(() => {
                    document.getElementById('msg').style.opacity = 1;
                    document.getElementById('hint').style.opacity = 0;
                }, 1200); 
            }
        }

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleTouch(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        canvas.addEventListener('mousemove', (e) => {
            if(e.buttons > 0) handleTouch(e.clientX, e.clientY);
        });

        window.addEventListener('resize', init);
        init();
        draw();
    });
    </script>
</body>
</html>
