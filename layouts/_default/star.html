<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моєї Юлі</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000008; }
        canvas { display: block; touch-action: none; position: fixed; top: 0; left: 0; z-index: 1; }
        #msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    /* Використовуємо Playfair Display, курсив додає елегантності */
    font-family: 'Playfair Display', serif; 
    font-style: italic;
    font-weight: 600;
    font-size: 32px; /* Трохи збільшив для акценту */
    text-align: center;
    opacity: 0;
    transition: opacity 3s ease-in-out;
    pointer-events: none;
    width: 85%;
    /* М'яке золотисте сяйво навколо тексту */
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 215, 0, 0.3);
    z-index: 10;
    line-height: 1.4;
}
        #hint {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 13px; z-index: 10;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="msg">Ти моє найяскравіше сузір'я, Юля ❤️</div>
    <div id="hint">Запали серце серед зірок...</div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [], heartPoints = [], isFinished = false;

        const colorGold = '#FFD700';
        const colorActive = '#FFFFFF';

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            
            stars = Array.from({length: 120}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 0.8,
                o: Math.random(),
                s: 0.01 + Math.random() * 0.02
            }));

            heartPoints = [];
            const centerX = w / 2;
            const centerY = h / 2 - 20;
            // Зменшено масштаб: було /30, тепер /40
            const scale = Math.min(w, h) / 40; 

            const totalPoints = 22; 
            for (let i = 0; i < totalPoints; i++) {
                const t = (i / totalPoints) * Math.PI * 2;
                const x = centerX + 16 * Math.pow(Math.sin(t), 3) * scale;
                const y = centerY - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
                heartPoints.push({
                    x, y, 
                    active: false, 
                    phase: Math.random() * Math.PI * 2, // Рандомна початкова фаза блимання
                    blinkSpeed: 0.03 + Math.random() * 0.05 // Рандомна швидкість блимання
                });
            }
        }

        function draw() {
            ctx.fillStyle = '#000008';
            ctx.fillRect(0, 0, w, h);

            // 1. Фонові зірки
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.o += (Math.random() - 0.5) * 0.03;
                if(s.o < 0.1) s.o = 0.1; if(s.o > 0.7) s.o = 0.7;
            });

            // 2. Пунктир-підказка (дуже тонкий)
            if (!isFinished) {
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
                ctx.lineWidth = 0.5;
                ctx.setLineDash([3, 6]);
                ctx.beginPath();
                ctx.moveTo(heartPoints[0].x, heartPoints[0].y);
                heartPoints.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 3. Золота лінія з'єднання
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            let hasActive = false;
            heartPoints.forEach((p) => {
                if(p.active) {
                    if(!hasActive) { ctx.moveTo(p.x, p.y); hasActive = true; }
                    else { ctx.lineTo(p.x, p.y); }
                }
            });
            ctx.stroke();

            // 4. Зірки серця (тонші та блимають)
            heartPoints.forEach(p => {
                p.phase += p.blinkSpeed; // Змінюємо фазу для блимання
                const currentOpacity = 0.3 + (Math.sin(p.phase) + 1) * 0.35; // Коливання прозорості

                if (p.active) {
                    ctx.shadowBlur = 10; ctx.shadowColor = 'white';
                    ctx.fillStyle = `rgba(255, 255, 255, 1)`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.shadowBlur = 5; ctx.shadowColor = colorGold;
                    ctx.fillStyle = `rgba(255, 215, 0, ${currentOpacity})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        function handleTouch(ex, ey) {
            if (isFinished) return;
            heartPoints.forEach(p => {
                const d = Math.hypot(ex - p.x, ey - p.y);
                if (d < 30) p.active = true;
            });

            if (heartPoints.every(p => p.active)) {
                isFinished = true;
                document.getElementById('msg').style.opacity = 1;
                document.getElementById('hint').style.opacity = 0;
                if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
            }
        }

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleTouch(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        canvas.addEventListener('mousemove', (e) => {
            if(e.buttons > 0) handleTouch(e.clientX, e.clientY);
        });

        window.addEventListener('resize', init);
        init();
        draw();
    });
    </script>
</body>
</html>
