<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моєї Юлі</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; }
        canvas { display: block; touch-action: none; position: fixed; top: 0; left: 0; z-index: 1; }
        
        #msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600;
            font-size: 26px; text-align: center; opacity: 0;
            transition: opacity 2.5s ease-in-out; pointer-events: none; width: 220px; 
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.4);
            z-index: 10; line-height: 1.3;
        }
        .sub-msg { font-size: 18px; opacity: 0.8; margin-top: 10px; font-weight: 400; letter-spacing: 2px; }
        @media (min-width: 600px) { #msg { font-size: 32px; width: 350px; } .sub-msg { font-size: 22px; } }
        
        #hint {
            position: fixed; bottom: 60px; width: 100%; text-align: center;
            color: rgba(255,215,0,0.4); font-family: sans-serif; font-size: 16px; z-index: 10;
            letter-spacing: 1px; display: none;
        }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; background: rgba(255, 215, 0, 0.1); color: #FFD700;
            border: 1px solid #FFD700; font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 20px; border-radius: 25px; z-index: 100; cursor: pointer;
            text-shadow: 0 0 5px #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <button id="start-btn">Почати ✨</button>
    <div id="msg">
        Я тебе люблю
        <div class="sub-msg">Ти мій всесвіт</div>
    </div>
    <div id="hint">З'єднай золоті зірочки...</div>

    <script type="text/javascript">
    /* <![CDATA[ */
    document.addEventListener('DOMContentLoaded', function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let w, h, stars = [], heartPoints = [], isFinished = false, flashAlpha = 0;
        
        let baseTiltX = null, baseTiltY = null;
        let currentTiltX = 0, currentTiltY = 0;
        let targetOffsetX = 0, targetOffsetY = 0;

        const colorGold = '#FFD700';       
        const colorHeart = '#FF0000';      
        const colorGlow = '#FF4500';       

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 250; i++) {
                stars.push({
                    x: Math.random() * w, y: Math.random() * h,
                    r: Math.random() * Math.random() * 1.7, 
                    o: 0.3 + Math.random() * 0.6,
                    depth: 0.5 + Math.random() * 2.5 // Глибокий діапазон зміщення
                });
            }

            const centerX = w / 2, centerY = h / 2 - 20, scale = Math.min(w, h) / 40;
            heartPoints = [];
            for (let i = 0; i < 22; i++) {
                const t = (i / 22) * Math.PI * 2;
                const x = centerX + 16 * Math.pow(Math.sin(t), 3) * scale;
                const y = centerY - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
                heartPoints.push({ x: x, y: y, active: false, phase: Math.random()*10, blinkSpeed: 0.05 });
            }
        }

        function draw() {
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, w, h);

            // Дуже швидка реакція на рух (0.2)
            currentTiltX += (targetOffsetX - currentTiltX) * 0.2;
            currentTiltY += (targetOffsetY - currentTiltY) * 0.2;

            stars.forEach(function(s) {
                const parallaxX = currentTiltX * s.depth;
                const parallaxY = currentTiltY * s.depth;
                
                let finalX = (s.x + parallaxX) % w;
                let finalY = (s.y + parallaxY) % h;

                if (finalX < 0) finalX += w;
                if (finalY < 0) finalY += h;

                ctx.fillStyle = 'rgba(255, 255, 255, ' + s.o + ')';
                ctx.beginPath(); ctx.arc(finalX, finalY, s.r, 0, Math.PI*2); ctx.fill();
                s.o += (Math.random() - 0.5) * 0.03;
                if(s.o < 0.2) s.o = 0.2; if(s.o > 0.9) s.o = 0.9;
            });

            if (!isFinished && flashAlpha <= 0) {
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
                ctx.lineWidth = 0.5; ctx.setLineDash([3, 6]);
                ctx.beginPath(); drawPath(); ctx.stroke(); ctx.setLineDash([]);
            }

            if (flashAlpha > 0) flashAlpha -= 0.015;

            if (isFinished) {
                ctx.strokeStyle = 'rgba(255, 0, 0, ' + (0.4 + flashAlpha * 0.6) + ')';
                ctx.lineWidth = 10 + flashAlpha * 10;
                ctx.shadowBlur = 35 + flashAlpha * 45; ctx.shadowColor = colorGlow;
                ctx.beginPath(); drawPath(); ctx.stroke();

                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                ctx.shadowBlur = 5; ctx.shadowColor = colorGold;
                ctx.beginPath(); drawPath(); ctx.stroke();
            } else if (heartPoints.some(p => p.active)) {
                ctx.strokeStyle = colorHeart; ctx.lineWidth = 2;
                ctx.beginPath(); drawPath(); ctx.stroke();
            }

            heartPoints.forEach(function(p) {
                p.phase += p.blinkSpeed;
                const op = 0.3 + (Math.sin(p.phase) + 1) * 0.35;
                if (p.active) {
                    ctx.shadowBlur = 10; ctx.shadowColor = 'white';
                    ctx.fillStyle = isFinished ? colorGold : 'white';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.shadowBlur = 8; ctx.shadowColor = colorGold;
                    ctx.fillStyle = 'rgba(255, 215, 0, ' + op + ')';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.8, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
            requestAnimationFrame(draw);
        }

        function drawPath() {
            let moved = false;
            heartPoints.forEach(p => {
                if(p.active) {
                    if(!moved) { ctx.moveTo(p.x, p.y); moved = true; }
                    else ctx.lineTo(p.x, p.y);
                }
            });
        }

        function handleOrientation(event) {
            if (baseTiltX === null) {
                baseTiltX = event.gamma;
                baseTiltY = event.beta;
            }
            // Максимальна чутливість (множники 6.0 та 5.0)
            targetOffsetX = (event.gamma - baseTiltX) * 6.0;
            targetOffsetY = (event.beta - baseTiltY) * 5.0; 
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('hint').style.display = 'block';
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        });

        canvas.addEventListener('touchmove', e => { e.preventDefault(); handleTouch(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        canvas.addEventListener('mousemove', e => { if(e.buttons > 0) handleTouch(e.clientX, e.clientY); });
        
        function handleTouch(ex, ey) {
            if (isFinished) return;
            heartPoints.forEach(p => { if (Math.hypot(ex - p.x, ey - p.y) < 35) p.active = true; });
            if (heartPoints.every(p => p.active)) {
                flashAlpha = 1.0; isFinished = true;
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                setTimeout(() => { document.getElementById('msg').style.opacity = 1; document.getElementById('hint').style.opacity = 0; }, 1200);
            }
        }

        window.addEventListener('resize', init);
        init(); draw();
    });
    /* ]]> */
    </script>
</body>
</html>
