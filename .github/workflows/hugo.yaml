name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Додаємо примусове використання Node.js 24 для всіх кроків
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Робота зі збірки сайту
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
          
      - name: Build
        run: hugo --minify
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Робота з публікації та сповіщення
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Завантажуємо код, щоб скрипт міг аналізувати зміни (git diff)
      - name: Checkout code for Telegram
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Скрипт розумного сповіщення
      - name: Send Telegram Notification
        if: success()
        run: |
          echo "=== ПОЧАТОК РОБОТИ СКРИПТА ==="
          
          # Шукаємо змінений md файл в останньому коміті
          CHANGED_FILE=$(git diff --name-only HEAD~1 HEAD | grep "content/.*\.md$" | head -n 1)
          
          if [ -z "$CHANGED_FILE" ]; then
             CHANGED_FILE=$(git show --name-only --format= HEAD | grep "content/.*\.md$" | head -n 1)
          fi

          echo "Знайдено файл: $CHANGED_FILE"

          if [ -n "$CHANGED_FILE" ] && [ -f "$CHANGED_FILE" ]; then
              echo "Обробляємо новий пост..."
              
              # Витягуємо заголовок
              POST_TITLE=$(grep "^title:" "$CHANGED_FILE" | sed 's/^title:[[:space:]]*//' | tr -d '"' | tr -d "'")
              
              # Формуємо посилання
              SLUG=$(echo "$CHANGED_FILE" | sed 's/^content\///' | sed 's/\.md$//' | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')
              
              POST_LINK="https://for-my-sunshine.com.ua/$SLUG/"
              MESSAGE="💌 <b>Новий запис!</b>%0A%0A📝 Тема: $POST_TITLE%0A%0A$POST_LINK"
          else
              echo "Markdown файлів не знайдено, відправляємо загальне сповіщення."
              COMMIT_MSG="${{ github.event.head_commit.message }}"
              # Посилання на секретний розділ
              MESSAGE="⚙️ <b>Блог оновлено!</b>%0A%0AКоментар: $COMMIT_MSG%0A%0A👉 https://for-my-sunshine.com.ua/secret-view-j/"
          fi

          echo "Відправляємо запит в Telegram..."

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=HTML \
          -d text="$MESSAGE"
